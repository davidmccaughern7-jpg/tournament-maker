<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daves Pro Tourney</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { 
            --p: #2563eb; --p-dark: #1e40af; --bg: #f1f5f9; 
            --card: #ffffff; --text: #1e293b; --danger: #ef4444; 
            --success: #22c55e; --border: #e2e8f0; --accent: #6366f1;
        }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); padding: 0; margin: 0; 
            padding-bottom: 100px; line-height: 1.5;
        }

        header {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            padding: 15px; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }

        .container { max-width: 900px; margin: auto; padding: 15px; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); 
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        input[type="text"], input[type="number"], select { 
            padding: 12px; border: 1px solid var(--border); border-radius: 10px; 
            width: 100%; font-size: 16px; transition: border 0.2s; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--p); }

        .btn { 
            padding: 12px 20px; border-radius: 10px; font-weight: 600; 
            border: none; cursor: pointer; transition: all 0.2s;
        }
        .btn-p { background: var(--p); color: white; }
        .btn-p:hover { background: var(--p-dark); transform: translateY(-1px); }

        .match-box { 
            background: #f8fafc; border: 1px solid var(--border); 
            border-radius: 12px; padding: 12px; margin-bottom: 12px;
        }
        .player-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 6px 0; border-radius: 6px; cursor: pointer;
        }
        .player-row.is-winner { background: #dcfce7; font-weight: bold; border-left: 4px solid var(--success); padding-left: 8px; }
        .score-input { width: 60px !important; text-align: center; font-weight: bold; padding: 8px; }

        .bracket-wrapper { display: flex; overflow-x: auto; padding: 20px 0; gap: 40px; }
        .bracket-round { display: flex; flex-direction: column; justify-content: space-around; min-width: 220px; }
        .bracket-match { position: relative; margin: 15px 0; }
        
        .bracket-match::after {
            content: ""; position: absolute; right: -40px; top: 50%;
            width: 40px; border-top: 2px solid #cbd5e1; z-index: 1;
        }
        .bracket-round:last-child .bracket-match::after { display: none; }

        nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; 
            display: flex; border-top: 1px solid var(--border); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-btn { 
            flex: 1; padding: 15px 5px; border: none; background: none; 
            font-size: 0.75rem; color: #64748b; font-weight: 600;
            display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
        }
        .tab-btn.active { color: var(--p); border-top: 3px solid var(--p); background: #f8fafc; }

        .hidden { display: none; }
        body:not(.is-admin) .admin-only { display: none !important; }
        body:not(.is-admin) input { pointer-events: none; opacity: 0.8; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #64748b; padding: 8px; }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 1.1rem; color: var(--p);">🏆 Dave's Tourney</div>
    <button id="admin-lock-btn" class="btn" style="background:#f1f5f9; padding: 5px 12px; font-size: 0.8rem;" onclick="checkPassword()">🔓 Admin Login</button>
</header>

<div class="container">
    <div id="tab-setup" class="tab-content">
        <div class="card">
            <h2>Player Roster</h2>
            <div class="admin-only">
                <div style="display:flex; gap:8px; margin-bottom:12px">
                    <input type="text" id="name-input" placeholder="Enter Player Name">
                    <button onclick="addPlayer()" class="btn btn-p">Add</button>
                </div>
                <label style="display:flex; align-items:center; gap:8px; font-size:0.9rem; cursor:pointer">
                    <input type="checkbox" id="seed-checkbox"> Mark as Top Seed (⭐)
                </label>
            </div>
            <div id="setup-player-list" style="margin-top:20px"></div>
            
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                <div><label style="font-size:0.7rem; font-weight:800">MATCH FORMAT</label><select id="match-format" class="admin-only" style="display:block;"><option value="3">Best of 3</option><option value="1">One Game</option></select></div>
                <div><label style="font-size:0.7rem; font-weight:800">COURTS/GROUPS</label><input type="number" id="courts" value="2"></div>
            </div>
            <button onclick="startTournament()" class="btn btn-p admin-only" style="width:100%; margin-top:20px; padding:18px">Generate Group Stages</button>
        </div>
    </div>

    <div id="tab-groups" class="tab-content hidden"><div id="groups-container"></div></div>

    <div id="tab-standings" class="tab-content hidden">
        <div class="card">
            <h2>Leaderboard</h2>
            <div id="standings-tables"></div>
        </div>
    </div>

    <div id="tab-brackets" class="tab-content hidden">
        <div class="card">
            <div class="admin-only">
                <button onclick="generateBrackets()" class="btn btn-p" style="width:100%; background:var(--success); margin-bottom:15px">Generate Final Brackets</button>
            </div>
            
            <button onclick="exportBracket('export-area')" class="btn" style="width:100%; background:var(--accent); color:white; margin-bottom:20px">📸 Download Results Image</button>

            <div id="export-area" style="padding:15px; background:white; border-radius:10px">
                <h3 style="color:var(--p); border-bottom:2px solid var(--p); padding-bottom:5px">CHAMPIONSHIP BRACKET</h3>
                <div id="top-bracket" class="bracket-wrapper"></div>

                <h3 style="color:#64748b; border-bottom:2px solid #64748b; padding-bottom:5px; margin-top:40px">CONSOLATION BRACKET</h3>
                <div id="bottom-bracket" class="bracket-wrapper"></div>
            </div>

            <div class="admin-only" style="margin-top:30px">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <button onclick="advance('top')" class="btn btn-p">Advance Champ</button>
                    <button onclick="advance('bottom')" class="btn" style="background:#64748b; color:white">Advance Consolation</button>
                </div>
                <button onclick="resetAll()" class="btn" style="width:100%; color:var(--danger); background:none; border:1px solid var(--danger); margin-top:50px">Wipe Tournament Data</button>
            </div>
        </div>
    </div>
</div>

<nav>
    <button class="tab-btn active" onclick="switchTab('setup')"><span>⚙️</span>Setup</button>
    <button class="tab-btn" onclick="switchTab('groups')"><span>🎾</span>Matches</button>
    <button class="tab-btn" onclick="switchTab('standings')"><span>📊</span>Standings</button>
    <button class="tab-btn" onclick="switchTab('brackets')"><span>🏆</span>Finals</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const ADMIN_PASSWORD = "yourpassword123"; 
    
    let state = { view: 'setup', players: [], format: 3, courts: 2, groupMatches: [], brackets: { top: [], bottom: [] } };
    let isAdmin = false;

    // --- ATTACH FUNCTIONS TO WINDOW IMMEDIATELY ---
    window.switchTab = (t) => { state.view = t; renderAll(); save(); };

    window.checkPassword = (p) => {
        const pw = p || prompt("Admin Password:");
        if(pw === ADMIN_PASSWORD) {
            isAdmin = true;
            localStorage.setItem('tourney_admin', pw);
            document.body.classList.add('is-admin');
            document.getElementById('admin-lock-btn').innerHTML = "✅ Admin Mode";
            if(!p) alert("Login successful. You now have edit access.");
        } else if (p === undefined || p === null) {
            // User hit cancel, do nothing
        } else {
            alert("Incorrect password!");
            localStorage.removeItem('tourney_admin');
        }
    };

    window.addPlayer = () => {
        const nameInput = document.getElementById('name-input');
        const seedCheck = document.getElementById('seed-checkbox');
        if(!nameInput.value.trim()) return;
        state.players = state.players || [];
        state.players.push({ 
            name: nameInput.value.trim(), 
            seeded: seedCheck.checked, 
            wins: 0, ptsF: 0, ptsA: 0, diff: 0 
        });
        nameInput.value = ''; seedCheck.checked = false;
        renderAll(); save();
    };

    window.removePlayer = (idx) => { state.players.splice(idx, 1); renderAll(); save(); };

    window.startTournament = () => {
        state.format = document.getElementById('match-format').value;
        state.courts = parseInt(document.getElementById('courts').value);
        
        let seeded = state.players.filter(p => p.seeded).sort(() => Math.random() - 0.5);
        let normal = state.players.filter(p => !p.seeded).sort(() => Math.random() - 0.5);
        
        let groups = Array.from({ length: state.courts }, () => []);
        seeded.forEach((p, i) => groups[i % state.courts].push(p));
        normal.forEach((p, i) => groups[(i + seeded.length) % state.courts].push(p));

        state.groupMatches = [];
        groups.forEach((gp, idx) => {
            const gid = idx + 1;
            gp.forEach(p => p.groupId = gid);
            for(let a=0; a<gp.length; a++) {
                for(let b=a+1; b<gp.length; b++) {
                    state.groupMatches.push({ 
                        group: gid, p1: gp[a].name, p2: gp[b].name, 
                        s1: 0, s2: 0, winner: "" 
                    });
                }
            }
        });
        state.view = 'groups'; renderAll(); save();
    };

    window.updateScore = (idx, field, val) => {
        state.groupMatches[idx][field] = parseInt(val) || 0;
        save();
    };

    window.setWinner = (idx, name) => {
        if(!isAdmin) return;
        state.groupMatches[idx].winner = state.groupMatches[idx].winner === name ? "" : name;
        renderAll(); save();
    };

    window.updateBracketScore = (t, ri, mi, field, val) => {
        state.brackets[t][ri][mi][field] = parseInt(val) || 0;
        save();
    };

    window.setBracketWinner = (t, ri, mi, name) => {
        if(!isAdmin) return;
        state.brackets[t][ri][mi].winner = state.brackets[t][ri][mi].winner === name ? "" : name;
        renderAll(); save();
    };

    window.generateBrackets = () => {
        const sorted = [...(state.players || [])].sort((a,b) => b.wins - a.wins || b.diff - a.diff);
        const mid = Math.ceil(sorted.length / 2);
        
        initB('top', sorted.slice(0, mid));
        initB('bottom', sorted.slice(mid));
        renderAll(); save();
    };

    function initB(t, list) {
        const size = Math.pow(2, Math.ceil(Math.log2(list.length || 1)));
        const r1 = [];
        for(let i=0; i < size/2; i++) {
            const p1 = list[i]?.name || "BYE";
            const p2 = list[size-1-i]?.name || "BYE";
            r1.push({ p1, p2, s1:0, s2:0, winner: (p1==="BYE"?p2 : p2==="BYE"?p1 : "") });
        }
        state.brackets[t] = [r1];
    }

    window.advance = (t) => {
        const rounds = state.brackets[t];
        if(!rounds || rounds.length === 0) return;
        const lastRound = rounds[rounds.length - 1];
        if(lastRound.length === 1) return alert("Tournament Final Reached!");

        const nextRound = [];
        for(let i=0; i<lastRound.length; i+=2) {
            const w1 = lastRound[i].winner;
            const w2 = lastRound[i+1]?.winner || "BYE";
            if(!w1 && lastRound[i].p1 !== "BYE") return alert("Complete all matches first!");
            nextRound.push({ p1: w1, p2: w2, s1:0, s2:0, winner: (w1==="BYE"?w2 : w2==="BYE"?w1 : "") });
        }
        state.brackets[t].push(nextRound);
        renderAll(); save();
    };

    window.exportBracket = (id) => {
        html2canvas(document.getElementById(id)).then(canvas => {
            const link = document.createElement('a');
            link.download = 'tournament-results.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    };

    window.resetAll = () => {
        if(confirm("Permanently wipe all data?")) {
            state = { view: 'setup', players: [], format: 3, courts: 2, groupMatches: [], brackets: { top: [], bottom: [] } };
            renderAll(); save();
        }
    };

    // --- RENDERING FUNCTIONS ---
    function renderAll() {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('hidden', c.id !== 'tab-'+state.view));
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            const tabs = ['setup','groups','standings','brackets'];
            btn.classList.toggle('active', tabs[i] === state.view);
        });

        if(state.view === 'setup') renderSetup();
        if(state.view === 'groups') renderGroups();
        if(state.view === 'standings') renderStandings();
        if(state.view === 'brackets') {
            renderBracketTree('top');
            renderBracketTree('bottom');
        }
    }

    function renderSetup() {
        const l = document.getElementById('setup-player-list');
        l.innerHTML = (state.players || []).map((p, idx) => `
            <div class="player-row" style="background:white; border:1px solid var(--border); margin-bottom:5px; padding:10px">
                <span>${p.seeded ? '⭐ ' : ''}${p.name}</span>
                <span class="admin-only" onclick="removePlayer(${idx})" style="color:var(--danger); cursor:pointer">Remove</span>
            </div>
        `).join('');
    }

    function renderGroups() {
        const c = document.getElementById('groups-container');
        c.innerHTML = '';
        if(!state.groupMatches || state.groupMatches.length === 0) return c.innerHTML = '<p style="text-align:center; margin-top:20px; color:#64748b;">No matches generated yet.</p>';
        
        for(let i=1; i<=state.courts; i++) {
            const matches = state.groupMatches.filter(m => m.group === i);
            if(!matches.length) continue;
            let html = `<div class="card"><h2 style="border-bottom:2px solid var(--p); padding-bottom:5px;">Group ${i}</h2>`;
            matches.forEach(m => {
                const gIdx = state.groupMatches.indexOf(m);
                html += `
                <div class="match-box">
                    <div class="player-row ${m.winner === m.p1 ? 'is-winner' : ''}" onclick="setWinner(${gIdx}, '${m.p1}')">
                        <span>${m.p1}</span>
                        <input type="number" class="score-input" value="${m.s1}" onclick="event.stopPropagation()" onchange="updateScore(${gIdx}, 's1', this.value)">
                    </div>
                    <div class="player-row ${m.winner === m.p2 ? 'is-winner' : ''}" onclick="setWinner(${gIdx}, '${m.p2}')">
                        <span>${m.p2}</span>
                        <input type="number" class="score-input" value="${m.s2}" onclick="event.stopPropagation()" onchange="updateScore(${gIdx}, 's2', this.value)">
                    </div>
                </div>`;
            });
            c.innerHTML += html + `</div>`;
        }
    }

    function renderStandings() {
        const container = document.getElementById('standings-tables');
        container.innerHTML = ''; 
        if(!state.players || state.players.length === 0) return container.innerHTML = '<p style="text-align:center; color:#64748b;">No data yet.</p>';
        
        state.players.forEach(p => { p.wins = 0; p.ptsF = 0; p.ptsA = 0; p.diff = 0; });
        (state.groupMatches || []).forEach(m => {
            const p1 = state.players.find(p => p.name === m.p1);
            const p2 = state.players.find(p => p.name === m.p2);
            if(p1 && p2) {
                p1.ptsF += m.s1; p1.ptsA += m.s2;
                p2.ptsF += m.s2; p2.ptsA += m.s1;
                if(m.winner === p1.name) p1.wins++;
                if(m.winner === p2.name) p2.wins++;
            }
        });
        state.players.forEach(p => p.diff = p.ptsF - p.ptsA);

        for(let i=1; i<=state.courts; i++) {
            const gp = state.players.filter(p => p.groupId === i).sort((a,b) => b.wins - a.wins || b.diff - a.diff);
            if(gp.length === 0) continue;
            let table = `<h3 style="margin-top:20px; color:var(--p)">Group ${i} Standings</h3><table><tr><th>Player</th><th>W</th><th>Diff</th></tr>`;
            gp.forEach(p => {
                table += `<tr><td>${p.name}</td><td><strong>${p.wins}</strong></td><td>${p.diff > 0 ? '+'+p.diff : p.diff}</td></tr>`;
            });
            container.innerHTML += table + `</table>`;
        }
    }

    function renderBracketTree(t) {
        const c = document.getElementById(t + '-bracket');
        const data = state.brackets?.[t];
        if(!data || !data.length) return c.innerHTML = `<p style="color:#94a3b8; font-size:0.8rem">Waiting for seeding...</p>`;

        c.innerHTML = data.map((round, ri) => `
            <div class="bracket-round">
                <div style="text-align:center; font-size:0.6rem; font-weight:bold; color:#94a3b8; margin-bottom:10px">ROUND ${ri+1}</div>
                ${round.map((m, mi) => `
                    <div class="bracket-match">
                        <div class="match-box" style="padding:0; overflow:hidden">
                            <div class="player-row ${m.winner === m.p1 ? 'is-winner' : ''}" style="padding:8px" onclick="setBracketWinner('${t}',${ri},${mi},'${m.p1}')">
                                <span style="font-size:0.8rem">${m.p1}</span>
                                ${m.p1 !== 'BYE' ? `<input type="number" class="score-input" value="${m.s1}" onclick="event.stopPropagation()" onchange="updateBracketScore('${t}',${ri},${mi},'s1',this.value)">` : ''}
                            </div>
                            <div class="player-row ${m.winner === m.p2 ? 'is-winner' : ''}" style="padding:8px; border-top:1px solid #eee" onclick="setBracketWinner('${t}',${ri},${mi},'${m.p2}')">
                                <span style="font-size:0.8rem">${m.p2}</span>
                                ${m.p2 !== 'BYE' ? `<input type="number" class="score-input" value="${m.s2}" onclick="event.stopPropagation()" onchange="updateBracketScore('${t}',${ri},${mi},'s2',this.value)">` : ''}
                            </div>
